<!DOCTYPE html>
<html>
<head>
    <title>Blog App</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>My Blog Application</h1>

<h2>Register / Login</h2>
<form>
    <input type="text" placeholder="Username"><br><br>
    <input type="password" placeholder="Password"><br><br>
    <button>Login</button>
</form>

<h2>Create Post</h2>
<textarea placeholder="Write your post here"></textarea><br><br>
<button>Publish</button>

<h2>Posts</h2>
<p>#technology First public post example</p>
<p>#news Another example post</p>

<h2>Comments</h2>
<input type="text" placeholder="Write comment">
<button>Add Comment</button>

</body>
</html>
